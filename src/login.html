<!DOCTYPE html>
<html>

<head>

<title>Circle of Good Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">

<style>


body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;

/* dark gradient background */
background: linear-gradient(135deg,#0f2027,#2c5364);
color:white;
}

/* login card */

.container{
background:#1e1e2f;
padding:35px;
width:360px;
border-radius:12px;
box-shadow:0 12px 30px rgba(0,0,0,0.6);
text-align:center;
}

.container h2{
margin-bottom:20px;
color:#ffffff;
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:none;
background:#2a2a40;
color:white;
}

input::placeholder{
color:#aaa;
}

button{
width:100%;
padding:12px;
background: linear-gradient(135deg,#4facfe,#6a11cb);
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.switch{
margin-top:15px;
color:#4facfe;
cursor:pointer;
}

.switch:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

<h1 id="title">Circle of Good</h1>

<form onsubmit="handleSubmit(event)">

<form id="loginForm">
  <input type="email" id="email" placeholder="Email" required />
  <input type="password" id="password" placeholder="Password" required />
  <button type="submit">Login</button>
</form>

<p id="error"></p>


<select id="role">
<option value="admin">Admin</option>
</select>

<input id="name" placeholder="Name" style="display:none">

<input id="email" type="email" placeholder="Email" required>

<input id="password" type="password" placeholder="Password" required>

<button type="submit">Continue</button>

</form>

<p class="switch" onclick="toggleForm()">
Create Account / Register
</p>

</div>

<script>

let isRegister=false;

function toggleForm(){

isRegister=!isRegister;

let name=document.getElementById("name");
let title=document.getElementById("title");

if(isRegister){
name.style.display="block";
title.innerText="Register";
}else{
name.style.display="none";
title.innerText="Circle of Good Login";
}

}

function handleSubmit(e){

e.preventDefault();

let role=document.getElementById("role").value;

if(role==="admin"){
window.location.href="admin-dashboard.html";
}else{
window.location.href="alumni-dashboard.html";
}

}

</script>

</body>
</html>
